<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Bingo Event Ultimate</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
margin-bottom:10px;
}

#board{
display:grid;
grid-template-columns:repeat(5,70px);
gap:6px;
justify-content:center;
margin-top:20px;
}

.cell{
background:white;
color:black;
border-radius:10px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
}

.hit{
background:#facc15;
}

button{
padding:12px 18px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
background:#22c55e;
color:white;
cursor:pointer;
}

#draw{
font-size:70px;
margin:15px;
}

.panel{
background:#1e293b;
padding:10px;
border-radius:10px;
margin:10px auto;
max-width:500px;
}

.playerCard{
border:1px solid #444;
padding:6px;
margin:4px;
border-radius:6px;
}
</style>
</head>

<body>

<h1>🎉 BINGO EVENT 🎉</h1>

<div id="controls">
<button onclick="createRoom()">ルーム作成</button>
<button onclick="draw()">抽選</button>
<button onclick="autoDraw()">自動抽選</button>
<button onclick="resetGame()">リセット</button>
</div>

<div id="room"></div>
<div id="players"></div>
<div id="draw"></div>
<div id="history"></div>
<div id="qr"></div>

<div id="board"></div>

<div class="panel">
<h2>ランキング / 状況</h2>
<div id="ranking"></div>
</div>

<audio id="drawSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="bingoSound" src="https://actions.google.com/sounds/v1/crowd/large_crowd_cheer.ogg"></audio>

<script>

const firebaseConfig = {
apiKey:"AIzaSyBaRpc7J7dwgvLLgzV5dM5YHDgIYa9bQWU",
authDomain:"bibibingo-72f63.firebaseapp.com",
databaseURL:"https://bibibingo-72f63-default-rtdb.firebaseio.com",
projectId:"bibibingo-72f63"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let params = new URLSearchParams(location.search);
let room = params.get("room");
let host = params.get("host");
let screen = params.get("screen");

let playerId = localStorage.getItem("bingoId");
if(!playerId){
playerId = Math.random().toString(36).substring(2);
localStorage.setItem("bingoId",playerId);
}

let name = localStorage.getItem("bingoName");
if(!name && !host){
name = prompt("名前を入力");
localStorage.setItem("bingoName",name);
}

let history = [];
let autoMode = false;

// ルーム作成
function createRoom(){
const id = Math.random().toString(36).substring(2,7);
location.href = "?room="+id+"&host=1";
}

// ルーム参加
if(room){

document.getElementById("room").innerText="ROOM: "+room;

// QR生成
const url = location.origin + location.pathname + "?room="+room;
document.getElementById("qr").innerHTML =
`<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${url}">`;

if(!host && !screen){
generateCard();
}

if(!host){
db.ref("rooms/"+room+"/players/"+playerId).set({
name:name,
bingo:false
});
}

// プレイヤー監視
db.ref("rooms/"+room+"/players").on("value",snap=>{
const players = snap.val()||{};
updateDashboard(players);
});

// 抽選監視
db.ref("rooms/"+room+"/numbers").on("value",snap=>{
const nums = snap.val()||[];
history = nums;
updateHits(nums);
updateHistory();
});

}

// カード生成
function generateCard(){

const board = document.getElementById("board");
board.innerHTML="";

let nums=[];
while(nums.length<25){
let n=Math.floor(Math.random()*75)+1;
if(!nums.includes(n)) nums.push(n);
}

db.ref("rooms/"+room+"/players/"+playerId+"/card").set(nums);

nums.forEach(n=>{
let c=document.createElement("div");
c.className="cell";
c.innerText=n;
board.appendChild(c);
});
}

// 抽選
function draw(){

if(!host) return;

let num=Math.floor(Math.random()*75)+1;

slotAnimation(num);
document.getElementById("drawSound").play();

db.ref("rooms/"+room+"/numbers").once("value").then(snap=>{
let list=snap.val()||[];
if(list.includes(num)) return draw();
list.push(num);
db.ref("rooms/"+room+"/numbers").set(list);
});
}

// スロット演出
function slotAnimation(finalNumber){
let count=0;
let slot=setInterval(()=>{
document.getElementById("draw").innerText=
Math.floor(Math.random()*75)+1;
count++;
if(count>15){
clearInterval(slot);
document.getElementById("draw").innerText=finalNumber;
}
},80);
}

// 自動抽選
function autoDraw(){
if(!host) return;
autoMode=!autoMode;
if(autoMode) loopDraw();
}

function loopDraw(){
if(!autoMode) return;
draw();
setTimeout(loopDraw,4000);
}

// リセット
function resetGame(){
if(!host) return;
db.ref("rooms/"+room).set({
numbers:[],
players:{}
});
location.reload();
}

// ヒット更新
function updateHits(list){

let hits=[];

document.querySelectorAll(".cell").forEach(c=>{
let num=Number(c.innerText);
if(list.includes(num)){
c.classList.add("hit");
hits.push(num);
}
});

if(!host && !screen){
db.ref("rooms/"+room+"/players/"+playerId+"/hits").set(hits);
checkBingo();
}

}

// 履歴
function updateHistory(){
document.getElementById("history").innerText=
"履歴: "+history.join(", ");
}

// ビンゴ判定
function checkBingo(){

const cells=[...document.querySelectorAll(".cell")];
let grid=[];

for(let i=0;i<5;i++){
grid[i]=cells.slice(i*5,(i+1)*5)
.map(c=>c.classList.contains("hit"));
}

let bingo=false;

for(let i=0;i<5;i++){
if(grid[i].every(v=>v)) bingo=true;
if(grid.map(r=>r[i]).every(v=>v)) bingo=true;
}

if(grid.map((r,i)=>r[i]).every(v=>v)) bingo=true;
if(grid.map((r,i)=>r[4-i]).every(v=>v)) bingo=true;

if(bingo){
document.getElementById("bingoSound").play();
db.ref("rooms/"+room+"/players/"+playerId+"/bingo").set(true);
}
}

// ダッシュボード
function updateDashboard(players){

let total=Object.keys(players).length;
let bingoCount=0;
let reachCount=0;

let html="";

Object.values(players).forEach(p=>{

let hit=p.hits ? p.hits.length : 0;

if(p.bingo) bingoCount++;
if(hit>=20 && !p.bingo) reachCount++;

html+=`
<div class="playerCard">
${p.name || "HOST"}
ヒット:${hit}
${p.bingo ? "🎉BINGO" : ""}
</div>
`;

});

document.getElementById("players").innerText=
"参加:"+total+" ビンゴ:"+bingoCount+" リーチ:"+reachCount;

document.getElementById("ranking").innerHTML=html;

}

// スクリーンモード
if(screen){
document.getElementById("board").style.display="none";
document.getElementById("controls").style.display="none";
document.body.style.zoom="1.4";
}

if(host){
document.getElementById("board").style.display="none";
}

</script>

</body>
</html>
